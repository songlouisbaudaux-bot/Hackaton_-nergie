services:
  traefik:
    image: traefik:v3
    command:
      - --log.level=INFO
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.caserver=${ACME_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.profile=shortlived
      - --certificatesresolvers.letsencrypt.acme.certificatesduration=160
      - --certificatesresolvers.letsencrypt.acme.disablecommonname=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    restart: unless-stopped

  game:
    build:
      context: .
      dockerfile: Dockerfile
    labels:
      - traefik.enable=true
      - traefik.http.routers.prometheus-game.rule=Host(`${PUBLIC_HOST}`)
      - traefik.http.routers.prometheus-game.entrypoints=websecure
      - traefik.http.routers.prometheus-game.tls=true
      - traefik.http.routers.prometheus-game.tls.certresolver=letsencrypt
      - traefik.http.services.prometheus-game.loadbalancer.server.port=80
    restart: unless-stopped

volumes:
  letsencrypt:
